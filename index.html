<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Current Page QR Code</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Current Page QR</h1>
      <p class="hint">Creates QR code for the opened tab URL.</p>

      <textarea
        id="url-input"
        rows="3"
        readonly
        aria-label="Current tab URL"
      ></textarea>

      <div class="actions">
        <button id="generate-btn">Generate QR</button>
        <button id="download-btn" disabled>Download PNG</button>
      </div>

      <div id="status" class="status" aria-live="polite"></div>

      <div class="qr-wrap">
        <img id="qr-image" alt="QR code preview" />
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
